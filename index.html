<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DexoRTX</title>

<style>

/* GLOBAL */
body{margin:0;font-family:Arial;background:#05070c;color:white;transition:0.4s}

/* ANIME HOME THEME */
.home-theme{
background:linear-gradient(120deg,#000000,#0f172a,#1e3a8a,#ef4444,#ffffff);
background-size:400% 400%;
animation:animeBG 12s ease infinite;
}

@keyframes animeBG{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

header{
padding:20px;
border-bottom:2px solid #ef4444;
position:sticky;
top:0;
z-index:10;
background:rgba(2,6,23,0.9);
backdrop-filter:blur(10px);
}

h1{margin:0;font-size:42px;color:#60a5fa}

.topbar{position:absolute;right:20px;top:20px}

.topbar button{
padding:8px 16px;border:none;border-radius:6px;background:#ef4444;color:white;cursor:pointer
}

/* THREE DOT MENU */
.menuButton{
position:absolute;
left:20px;
top:20px;
padding:8px 12px;
background:#1e293b;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
font-size:18px
}

/* HOME BUTTONS */
.home-buttons button{
padding:20px 40px;
margin:10px;
font-size:20px;
border:none;
border-radius:14px;
cursor:pointer;
background:linear-gradient(45deg,#3b82f6,#ef4444);
color:white;
box-shadow:0 0 20px rgba(0,0,0,0.5);
transition:0.3s
}

.home-buttons button:hover{transform:scale(1.08)}

section{display:none;padding:30px}

/* GRID */
.list{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:18px;
max-width:1500px;
margin:auto
}

/* NETFLIX STYLE CARD */
.card{
background:#0f172a;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:0.25s;
box-shadow:0 0 10px #000
}

.card:hover{
transform:scale(1.07);
box-shadow:0 0 25px #3b82f6
}

.card img{
width:100%;
height:260px;
object-fit:cover
}

.card-info{padding:8px}
.rating{color:#facc15}

/* DETAILS PAGE */
#details{
max-width:950px;
margin:40px auto;
background:#0f172a;
padding:30px;
border-radius:12px;
display:none;
text-align:left
}

.buttons button{
margin:6px;
padding:10px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
cursor:pointer
}

.back{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:6px;
background:#ef4444;
color:white;
cursor:pointer
}

/* FILTER SIDEBAR */
#sidebar{
position:fixed;
left:-260px;
top:0;
width:260px;
height:100%;
background:#020617;
padding:20px;
transition:.3s;
z-index:20
}

#sidebar h3{margin-top:0;color:#60a5fa}

#sidebar button{
display:block;
width:100%;
margin:8px 0;
padding:10px;
background:#1e293b;
border:none;
color:white;
border-radius:6px;
cursor:pointer
}

/* PS5 THEME */
.ps5{
background:linear-gradient(120deg,#020617,#0b1120,#1d4ed8);
}

</style>
</head>

<body class="home-theme">

<div id="sidebar">
<h3>Filters</h3>
<button onclick="sortRating()">Best Ratings</button>
<button onclick="filterGenre('Crime')">Crime</button>
<button onclick="filterGenre('Action')">Action</button>
<button onclick="filterGenre('Drama')">Drama</button>
<button onclick="closeMenu()">Close</button>
</div>

<header id="home">

<button class="menuButton" onclick="openMenu()">⋮</button>

<div class="topbar">
<span id="userLabel">Guest</span>
<button onclick="fakeLogin()">Login</button>
</div>

<h1>DexoRTX</h1>
<p>Games • Movies</p>

<div class="home-buttons">
<button onclick="showSection('gamesMenu')">🎮 Games</button>
<button onclick="showSection('moviesMenu')">🎬 Movies</button>
</div>

</header>

<section id="gamesMenu">
<div class="list">
<div class="card" onclick="openGames('freeGames')"><div class="card-info">Free Games</div></div>
<div class="card" onclick="openGames('paidGames')"><div class="card-info">Paid Games</div></div>
</div>
<button class="back" onclick="goHome()">Back</button>
</section>

<section id="freeGames"><div class="list" id="freeGamesList"></div><button class="back" onclick="showSection('gamesMenu')">Back</button></section>
<section id="paidGames"><div class="list" id="paidGamesList"></div><button class="back" onclick="showSection('gamesMenu')">Back</button></section>

<section id="moviesMenu">
<div class="list" id="moviesList"></div>
<button class="back" onclick="goHome()">Back</button>
</section>

<div id="details"></div>

<script>

/* LOGIN */
function fakeLogin(){
const name=prompt("Enter username")
if(name)document.getElementById("userLabel").innerText=name
}

/* MENU */
function openMenu(){document.getElementById("sidebar").style.left="0"}
function closeMenu(){document.getElementById("sidebar").style.left="-260px"}

/* NAVIGATION */
function showSection(section){
 document.body.classList.remove("home-theme")
 document.getElementById("home").style.display="none"
 document.querySelectorAll("section").forEach(s=>s.style.display="none")
 document.getElementById(section).style.display="block"
}

function openGames(section){
 document.body.classList.add("ps5")
 showSection(section)
}

function goHome(){
 document.body.classList.remove("ps5")
 document.body.classList.add("home-theme")
 document.getElementById("home").style.display="block"
 document.querySelectorAll("section").forEach(s=>s.style.display="none")
 document.getElementById("details").style.display="none"
}

/* CARD */
function cardHTML(name,rating,img){
 return `<div class="card" onclick="openDetails('${name}')">
 <img loading="lazy" src="${img}">
 <div class="card-info">
 <div>${name}</div>
 <div class="rating">⭐ ${rating}</div>
 </div>
 </div>`
}

function appendCards(container,data,start,count){
 const end=Math.min(start+count,data.length)
 for(let i=start;i<end;i++){
  const d=data[i]
  container.insertAdjacentHTML("beforeend",cardHTML(d.name,d.rating,d.img))
 }
 return end
}

/* DETAILS */
function openDetails(name){
 const item=database[name]
 const box=document.getElementById("details")

 if(item.type==="game"){
 box.innerHTML=`
 <h2>${item.name}</h2>
 <img src="${item.img}" width="220">
 <p>${item.desc}</p>
 <p><b>Developer:</b> ${item.developer}</p>
 <p><b>Publisher:</b> ${item.publisher}</p>
 <p><b>Release:</b> ${item.release}</p>
 <div class="buttons">
 <button onclick="window.open('https://store.steampowered.com/search/?term='+encodeURIComponent(item.name))">Download</button>
 <button onclick="window.open('https://www.youtube.com/results?search_query='+encodeURIComponent(item.name+' gameplay'))">Gameplay</button>
 </div>
 <button class="back" onclick="goHome()">Back</button>`
 }
 else{
 box.innerHTML=`
 <h2>${item.name}</h2>
 <img src="${item.img}" width="220">
 <p>${item.desc}</p>
 <p><b>Director:</b> ${item.director}</p>
 <p><b>Actors:</b> ${item.actors}</p>
 <p><b>Release:</b> ${item.release}</p>
 <div class="buttons">
 <button onclick="window.open('https://www.youtube.com/results?search_query='+encodeURIComponent(item.name+' trailer'))">Trailer</button>
 <button onclick="window.open('https://www.netflix.com/search?q='+encodeURIComponent(item.name))">Netflix</button>
 <button onclick="window.open('https://www.primevideo.com/search/ref=atv_nb_sr?phrase='+encodeURIComponent(item.name))">PrimeVideo</button>
 <button onclick="window.open('https://www.google.com/search?q='+encodeURIComponent(item.name+' netmirror'))">NetMirror</button>
 </div>
 <button class="back" onclick="goHome()">Back</button>`
 }

 box.style.display="block"
 document.querySelectorAll("section").forEach(s=>s.style.display="none")
}

/* DATABASE */
const database={}

/* POSTERS */
function moviePoster(name){
 return `https://img.omdbapi.com/?apikey=trilogy&t=${encodeURIComponent(name)}`
}

function steamPoster(appid){
 return `https://cdn.cloudflare.steamstatic.com/steam/apps/${appid}/capsule_616x353.jpg`
}

/* ADD MOVIE */
function addMovie(name){
 database[name]={
 name,
 type:"movie",
 rating:(Math.random()*4+6).toFixed(1),
 img:moviePoster(name),
 desc:`${name} is a popular film known for its storytelling.`,
 director:"Unknown Director",
 actors:"Actor A, Actor B",
 release:1990+Math.floor(Math.random()*30)
 }
 return database[name]
}

/* ADD GAME */
function addGame(name,appid){
 database[name]={
 name,
 type:"game",
 rating:(Math.random()*5+5).toFixed(1),
 img:steamPoster(appid),
 desc:`${name} is a popular Steam game with competitive gameplay.`,
 developer:"Steam Developer",
 publisher:"Steam Publisher",
 release:2005+Math.floor(Math.random()*20)
 }
 return database[name]
}

/* DATA */
const freeGames=[]
const paidGames=[]
const movies=[]

/* LOAD STEAM FEATURED */
async function loadSteamGames(){
 try{
  const res=await fetch("https://store.steampowered.com/api/featuredcategories?cc=us&l=en")
  const data=await res.json()

  const featured=[...data.featured_win.items,...data.top_sellers.items]

  featured.forEach((g,i)=>{
   const obj=addGame(g.name,g.id)
   if(i<20) freeGames.push(obj)
   else paidGames.push(obj)
  })

  loadMoreFree()
  loadMorePaid()
 }
 catch(e){console.log("Steam API failed",e)}
}

/* MOVIES LARGE DATA */
const movieNames=["The Godfather","Pulp Fiction","Se7en","Zodiac","Chinatown","Inception","The Matrix","Gladiator","Interstellar","The Dark Knight"]

for(let i=0;i<10000;i++){
 const m=movieNames[i%movieNames.length]+" "+(i+1)
 movies.push(addMovie(m))
}

/* LAZY LOAD */
let movieIndex=0
let freeIndex=0
let paidIndex=0
const BATCH=20

function loadMoreMovies(){
 movieIndex=appendCards(document.getElementById("moviesList"),movies,movieIndex,BATCH)
}

function loadMoreFree(){
 freeIndex=appendCards(document.getElementById("freeGamesList"),freeGames,freeIndex,BATCH)
}

function loadMorePaid(){
 paidIndex=appendCards(document.getElementById("paidGamesList"),paidGames,paidIndex,BATCH)
}

window.addEventListener("scroll",()=>{
 if(window.innerHeight+window.scrollY>=document.body.offsetHeight-400){
  if(document.getElementById("moviesMenu").style.display==="block") loadMoreMovies()
  if(document.getElementById("freeGames").style.display==="block") loadMoreFree()
  if(document.getElementById("paidGames").style.display==="block") loadMorePaid()
 }
})

/* START */
loadSteamGames()
loadMoreMovies()

</script>

</body>
</html>
