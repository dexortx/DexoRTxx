<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DexoRTX</title>

<style>

body{margin:0;font-family:Arial;background:#05070c;color:white}

header{
padding:20px;
background:linear-gradient(90deg,#020617,#0f172a,#020617);
border-bottom:2px solid #ef4444;
position:sticky;top:0;z-index:10
}

h1{margin:0;font-size:40px;color:#60a5fa}

.topbar{position:absolute;right:20px;top:20px}

.topbar button{
padding:8px 16px;border:none;border-radius:6px;background:#ef4444;color:white;cursor:pointer
}

.menuButton{
position:absolute;
left:20px;
top:20px;
padding:8px 16px;
background:#1e293b;
border:none;
border-radius:6px;
color:white;
cursor:pointer
}

.home-buttons button{
padding:18px 35px;margin:10px;font-size:18px;border:none;border-radius:12px;cursor:pointer;background:linear-gradient(45deg,#3b82f6,#ef4444);color:white
}

section{display:none;padding:30px}

.list{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:18px;
max-width:1400px;margin:auto
}

.card{
background:#0f172a;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:.25s;
box-shadow:0 0 10px #000
}

.card:hover{transform:scale(1.07);box-shadow:0 0 20px #3b82f6}

.card img{width:100%;height:260px;object-fit:cover}
.card-info{padding:8px}

.rating{color:#facc15}

#details{
max-width:950px;
margin:40px auto;
background:#0f172a;
padding:30px;
border-radius:12px;
display:none;
text-align:left
}

.buttons button{
margin:6px;padding:10px;border:none;border-radius:6px;background:#2563eb;color:white;cursor:pointer
}

.back{margin-top:20px;padding:10px 20px;border:none;border-radius:6px;background:#ef4444;color:white;cursor:pointer}

#sidebar{
position:fixed;
left:-260px;
top:0;
width:260px;
height:100%;
background:#020617;
padding:20px;
transition:.3s;
z-index:20
}

#sidebar h3{margin-top:0;color:#60a5fa}

#sidebar button{
display:block;
width:100%;
margin:8px 0;
padding:8px;
background:#1e293b;
border:none;
color:white;
border-radius:6px;
cursor:pointer
}

.ps5{
background:linear-gradient(120deg,#020617,#0b1120,#1d4ed8);
}

</style>
</head>

<body>

<div id="sidebar">
<h3>Filters</h3>
<button onclick="sortRating()">Best Ratings</button>
<button onclick="filterGenre('Crime')">Crime</button>
<button onclick="filterGenre('Action')">Action</button>
<button onclick="filterGenre('Drama')">Drama</button>
<button onclick="closeMenu()">Close</button>
</div>

<header id="home">

<button class="menuButton" onclick="openMenu()">☰</button>

<div class="topbar">
<span id="userLabel">Guest</span>
<button onclick="fakeLogin()">Login</button>
</div>

<h1>DexoRTX</h1>
<p>Games • Movies</p>

<div class="home-buttons">
<button onclick="showSection('gamesMenu')">🎮 Games</button>
<button onclick="showSection('moviesMenu')">🎬 Movies</button>
</div>

</header>

<section id="gamesMenu">
<div class="list">
<div class="card" onclick="openGames('freeGames')"><div class="card-info">Free Games</div></div>
<div class="card" onclick="openGames('paidGames')"><div class="card-info">Paid Games</div></div>
</div>
<button class="back" onclick="goHome()">Back</button>
</section>

<section id="freeGames"><div class="list" id="freeGamesList"></div><button class="back" onclick="showSection('gamesMenu')">Back</button></section>
<section id="paidGames"><div class="list" id="paidGamesList"></div><button class="back" onclick="showSection('gamesMenu')">Back</button></section>

<section id="moviesMenu">
<div class="list" id="moviesList"></div>
<button class="back" onclick="goHome()">Back</button>
</section>

<div id="details"></div>

<script>

function fakeLogin(){
 const name=prompt("Enter username")
 if(name) document.getElementById("userLabel").innerText=name
}

function openMenu(){document.getElementById("sidebar").style.left="0"}
function closeMenu(){document.getElementById("sidebar").style.left="-260px"}

function showSection(section){
 document.getElementById("home").style.display="none"
 document.querySelectorAll("section").forEach(s=>s.style.display="none")
 document.getElementById(section).style.display="block"
}

function openGames(section){
 document.body.classList.add("ps5")
 showSection(section)
}

function goHome(){
 document.body.classList.remove("ps5")
 document.getElementById("home").style.display="block"
 document.querySelectorAll("section").forEach(s=>s.style.display="none")
 document.getElementById("details").style.display="none"
}

function cardHTML(name,rating,img){
 return `<div class="card" onclick="openDetails('${name}')">
 <img src="${img}">
 <div class="card-info">
 <div>${name}</div>
 <div class="rating">⭐ ${rating}</div>
 </div>
 </div>`
}

function generate(container,data){
 container.innerHTML=""
 data.forEach(d=>container.innerHTML+=cardHTML(d.name,d.rating,d.img))
}

function openDetails(name){
 const item=database[name]
 const box=document.getElementById("details")

 if(item.type==="game"){
 box.innerHTML=`
 <h2>${item.name}</h2>
 <img src="${item.img}" width="200">
 <p>${item.desc}</p>

 <h3>Game Details</h3>
 <p><b>Developer:</b> ${item.developer}</p>
 <p><b>Publisher:</b> ${item.publisher}</p>
 <p><b>Genre:</b> ${item.genre}</p>
 <p><b>Platforms:</b> ${item.platform}</p>
 <p><b>Release:</b> ${item.release}</p>

 <h3>System Requirements</h3>
 <p>${item.specs}</p>

 <div class="buttons">
 <button onclick="window.open('https://www.youtube.com/results?search_query=${item.name}+gameplay')">Gameplay</button>
 <button onclick="window.open('https://store.steampowered.com/search/?term=${item.name}')">Download</button>
 </div>

 <button class="back" onclick="goHome()">Back</button>
 `
 }

 else{
 box.innerHTML=`
 <h2>${item.name}</h2>
 <img src="${item.img}" width="200">
 <p>${item.desc}</p>

 <h3>Movie Details</h3>
 <p><b>Director:</b> ${item.director}</p>
 <p><b>Producer:</b> ${item.producer}</p>
 <p><b>Actors:</b> ${item.actors}</p>
 <p><b>Genre:</b> ${item.genre}</p>
 <p><b>Release:</b> ${item.release}</p>

 <div class="buttons">
 <button onclick="window.open('https://www.youtube.com/results?search_query=${item.name}+trailer')">Trailer</button>
 <button onclick="window.open('https://www.netflix.com/search?q=${item.name}')">Watch</button>
 </div>

 <button class="back" onclick="goHome()">Back</button>
 `
 }

 box.style.display="block"
 document.querySelectorAll("section").forEach(s=>s.style.display="none")
}

const database={}

function moviePoster(name){
 return `https://source.unsplash.com/300x450/?movie,${encodeURIComponent(name)}`
}

function gamePoster(name){
 return `https://source.unsplash.com/300x450/?game,${encodeURIComponent(name)}`
}

function addMovie(name){
 database[name]={
 name,
 type:"movie",
 rating:(Math.random()*4+6).toFixed(1),
 img:moviePoster(name),
 desc:`${name} is a popular film known for its storytelling and strong performances.`,
 director:"Famous Director",
 producer:"Major Studio",
 actors:"Actor A, Actor B, Actor C",
 genre:["Crime","Drama","Action"][Math.floor(Math.random()*3)],
 release:1990+Math.floor(Math.random()*30)
 }
 return database[name]
}

function addGame(name){
 database[name]={
 name,
 type:"game",
 rating:(Math.random()*5+5).toFixed(1),
 img:gamePoster(name),
 desc:`${name} is an action video game with competitive gameplay.`,
 developer:"AAA Studio",
 publisher:"Major Publisher",
 genre:["Action","Shooter","Adventure"][Math.floor(Math.random()*3)],
 platform:"PC • PS5 • Xbox",
 release:2005+Math.floor(Math.random()*20),
 specs:"8GB RAM • GTX1060 • 50GB Storage"
 }
 return database[name]
}

const freeGames=[]
const paidGames=[]
const movies=[]

const gameNames=["Apex Legends","Fortnite","Warframe","Destiny 2","Genshin Impact","Elden Ring","God of War","Cyberpunk 2077","Minecraft","Valorant"]

for(let i=0;i<1000;i++){
 const g=gameNames[i%gameNames.length]+" "+(i+1)
 const obj=addGame(g)
 if(i<500)freeGames.push(obj)
 else paidGames.push(obj)
}

const movieNames=["The Godfather","Pulp Fiction","Se7en","Zodiac","Chinatown","Inception","The Matrix","Gladiator","Interstellar","The Dark Knight"]

for(let i=0;i<1000;i++){
 const m=movieNames[i%movieNames.length]+" "+(i+1)
 movies.push(addMovie(m))
}

function sortRating(){
 movies.sort((a,b)=>b.rating-a.rating)
 generate(document.getElementById("moviesList"),movies)
}

function filterGenre(g){
 const filtered=movies.filter(m=>m.genre===g)
 generate(document.getElementById("moviesList"),filtered)
}

generate(document.getElementById("freeGamesList"),freeGames)
generate(document.getElementById("paidGamesList"),paidGames)
generate(document.getElementById("moviesList"),movies)

</script>

</body>
</html>
